# ─── PlacementAI — GitHub Actions CI/CD ──────────────────────────────────────
# Triggers on push to main.
# Jobs:
#   1. test-build  — type-checks and builds Next.js
#   2. docker      — builds & pushes both images to GitHub Container Registry
#   3. deploy-vercel — deploys the web app to Vercel (optional)

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/placement-web
  IMAGE_AI:  ghcr.io/${{ github.repository_owner }}/placement-ai

jobs:

  # ─── Job 1: Build & type-check the Next.js app ────────────────────────────
  test-build:
    name: Build & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        env:
          DATABASE_URL: "file:./dev.db"
          NEXTAUTH_SECRET: "ci-secret-placeholder"
          NEXTAUTH_URL: "http://localhost:3000"
          GEMINI_API_KEY: "placeholder"
          GITHUB_TOKEN: "placeholder"
          AI_SERVICE_URL: "http://localhost:8000"
        run: npm run build

  # ─── Job 2: Build & push Docker images ────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push — AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ai-service
          file: ./apps/ai-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_AI }}:latest
            ${{ env.IMAGE_AI }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push — Web App
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            DATABASE_URL=file:/data/db/prod.db
            NEXTAUTH_SECRET=build-placeholder
            NEXTAUTH_URL=http://localhost:3000
            GEMINI_API_KEY=placeholder
            GITHUB_TOKEN=placeholder
            AI_SERVICE_URL=http://ai-service:8000

  # ─── Job 3: Deploy to Vercel (web app only) ───────────────────────────────
